<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Dangerous | Texas Tenant Rights</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-heading { font-family: 'Oswald', sans-serif; }
        .smoke-paper { background-color: #d1d1d1 !important; color: #1a1a1a !important; border: 4px solid #7e22ce !important; }
        .purple-ink { color: #7e22ce !important; font-weight: bold; }
        input, select { background: rgba(0, 0, 0, 0.7) !important; border: 1px solid #7e22ce !important; color: #a855f7 !important; }
    </style>
</head>
<body class="bg-black text-purple-600 font-sans p-4">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8 mt-10">
        
        <div class="bg-zinc-900 p-8 rounded-xl border border-purple-900">
            <h2 class="text-3xl font-heading mb-6 text-white uppercase italic">Notice Generator</h2>
            
            <label class="block text-[10px] font-bold text-white mb-1 uppercase">Full Name</label>
            <input type="text" id="inputName" oninput="syncNow()" class="w-full mb-4 p-3 rounded outline-none">

            <label class="block text-[10px] font-bold text-white mb-1 uppercase">Landlord Name</label>
            <input type="text" id="inputLandlord" oninput="syncNow()" class="w-full mb-4 p-3 rounded outline-none">

            <label class="block text-[10px] font-bold text-white mb-1 uppercase">Address</label>
            <input type="text" id="inputAddress" oninput="syncNow()" class="w-full mb-4 p-3 rounded outline-none">

            <label class="block text-[10px] font-bold text-white mb-1 uppercase">Select Issue</label>
            <select id="selectIssue" onchange="syncNow()" class="w-full mb-8 p-3 rounded outline-none">
                <option value="No Hot Water">No Hot Water</option>
                <option value="Broken AC">Broken AC (Health Hazard)</option>
                <option value="Mold Growth">Active Mold Growth</option>
                <option value="Retaliation">Formal Complaint: Retaliation</option>
                <option value="Accommodation">Reasonable Accommodation Request</option>
            </select>

            <button onclick="downloadPDF()" class="w-full bg-purple-700 text-white font-heading py-4 uppercase hover:bg-white hover:text-black transition">Download PDF</button>
        </div>

        <div class="smoke-paper p-8 min-h-[500px] shadow-2xl rounded">
            <p class="font-bold mb-4">DATE: <span id="viewDate"></span></p>
            <p>TO: <span id="viewLandlord" class="purple-ink">________________</span></p>
            <p class="mb-6">FROM: <span id="viewName" class="purple-ink">________________</span></p>
            
            <p id="viewSubject" class="font-bold mb-4 uppercase underline">RE: FORMAL NOTICE TO REPAIR</p>
            
            <p class="mb-4 text-sm">This letter serves as formal notice regarding the property at <span id="viewAddress" class="purple-ink">________________</span>.</p>
            
            <p class="text-xl font-bold italic mb-6 uppercase border-b-2 border-purple-500 pb-2">
                ISSUE: <span id="viewIssue">NO HOT WATER</span>
            </p>
            
            <p id="viewClosing" class="text-sm italic opacity-80 mb-8">This is my formal request to repair the condition promptly.</p>
            
            <p>Sincerely,</p>
            <p class="mt-4 font-bold" id="viewSign">________________</p>
        </div>
    </div>

    <script>
        function syncNow() {
            // 1. Get Values
            const name = document.getElementById('inputName').value || "________________";
            const landlord = document.getElementById('inputLandlord').value || "________________";
            const address = document.getElementById('inputAddress').value || "________________";
            const issue = document.getElementById('selectIssue').value;

            // 2. Push to Paper
            document.getElementById('viewDate').innerText = new Date().toLocaleDateString();
            document.getElementById('viewName').innerText = name;
            document.getElementById('viewSign').innerText = name;
            document.getElementById('viewLandlord').innerText = landlord;
            document.getElementById('viewAddress').innerText = address;
            document.getElementById('viewIssue').innerText = issue.toUpperCase();

            // 3. Logic for Subject and Closing
            const subject = document.getElementById('viewSubject');
            const closing = document.getElementById('viewClosing');

            if (issue === "Retaliation") {
                subject.innerText = "RE: FORMAL COMPLAINT REGARDING RETALIATION";
                closing.innerText = "I demand that this behavior cease immediately under Texas Law.";
            } else if (issue === "Accommodation") {
                subject.innerText = "RE: REQUEST FOR REASONABLE ACCOMMODATION";
                closing.innerText = "Please respond to this request within a reasonable timeframe.";
            } else {
                subject.innerText = "RE: FORMAL NOTICE TO REPAIR - TX PROPERTY CODE § 92.056";
                closing.innerText = "This is my formal request to repair the condition promptly.";
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const n = document.getElementById('inputName').value;
            const i = document.getElementById('selectIssue').value;
            doc.text("NOTICE: " + i.toUpperCase(), 20, 20);
            doc.text("FROM: " + n, 20, 30);
            doc.save("Notice.pdf");
        }

        // Run on start
        window.onload = syncNow;
    </script>
</body>
</html>
