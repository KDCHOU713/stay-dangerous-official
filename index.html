<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stay Dangerous Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forced Gray Paper */
        .paper { background-color: #d1d1d1 !important; color: #1a1a1a !important; padding: 40px; border: 4px solid #7e22ce; }
        .purple-text { color: #7e22ce !important; font-weight: bold; }
    </style>
</head>
<body class="bg-black p-10">

    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <div class="bg-zinc-900 p-6 rounded shadow-xl border border-purple-500">
            <label class="block text-white text-xs mb-2 uppercase">Full Name</label>
            <input type="text" id="tenantName" oninput="forceUpdate()" class="w-full mb-4 p-2 bg-black text-purple-400 border border-purple-900">
            
            <label class="block text-white text-xs mb-2 uppercase">Select Issue</label>
            <select id="issueSelect" onchange="forceUpdate()" class="w-full p-2 bg-black text-purple-400 border border-purple-900">
                <option value="No Hot Water">No Hot Water</option>
                <option value="Broken AC">Broken AC</option>
                <option value="Mold Growth">Mold Growth</option>
                <option value="Retaliation">Retaliation</option>
            </select>
        </div>

        <div class="paper">
            <p>TO: Management</p>
            <p>FROM: <span id="pTenant" class="purple-text">________________</span></p>
            <p class="mt-4 font-bold underline">RE: <span id="pSubject">NOTICE TO REPAIR</span></p>
            <p class="mt-4 italic text-xl">ISSUE: <span id="pIssue" class="purple-text">NO HOT WATER</span></p>
        </div>

    </div>

    <script>
        function forceUpdate() {
            // 1. Get the values
            var nameInput = document.getElementById('tenantName').value;
            var issueInput = document.getElementById('issueSelect').value;

            // 2. Debugging (Check your browser console!)
            console.log("Selected Issue is: " + issueInput);

            // 3. Update the Preview
            document.getElementById('pTenant').innerText = nameInput || "________________";
            document.getElementById('pIssue').innerText = issueInput.toUpperCase();

            // 4. Update the Subject line based on the issue
            var subjectBox = document.getElementById('pSubject');
            if (issueInput === "Retaliation") {
                subjectBox.innerText = "FORMAL COMPLAINT: RETALIATION";
            } else {
                subjectBox.innerText = "NOTICE TO REPAIR - TX CODE 92.056";
            }
        }
        
        // Run once on load to set it up
        window.onload = forceUpdate;
    </script>
</body>
</html>
